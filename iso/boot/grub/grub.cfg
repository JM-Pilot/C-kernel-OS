set timeout=15
set default=1
menuentry 'C kernel OS (CkOS) 0.03' {
	multiboot /bootImage.elf
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial output' {
	multiboot /bootImage.elf s_out
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial input + output' {
	multiboot /bootImage.elf s_in s_out
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with reduced output' {
	multiboot /bootImage.elf shut_up
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial output + reduced output' {
	multiboot /bootImage.elf s_out shut_up
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial input + output + reduced output' {
	multiboot /bootImage.elf s_out s_in shut_up
	boot
}
