set timeout=15
menuentry 'C kernel OS (CkOS) 0.03' {
	multiboot /bootImage.elf
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial output' {
	multiboot /bootImage.elf s_out
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with reduced output' {
	multiboot /bootImage.elf shut_up
	boot
}
menuentry 'C kernel OS (CkOS) 0.03 with serial + reduced output' {
	multiboot /bootImage.elf s_out shut_up
	boot
}
